name: Nova Launcher — Encrypt Companion + DEX + Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  NDK_VERSION:      r26d
  OPENSSL_TAG:      "3.6.1"
  ABIS:             "armeabi-v7a arm64-v8a x86 x86_64"
  ANDROID_PLATFORM: android-26

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1a: encrypt-companion  — encrypts companion.apk → companion.enc
# Stage 1b: encrypt-nova-dex  — builds Nova APK first to get classes.dex,
#                                encrypts it → nova.enc, patches nova_dex_decrypt.cpp
# Stage 2:  build-native       — builds libcompanionguard.so + libnovaguard.so
# Stage 3:  build-apk          — assembles final Nova APK with both .enc + .so files
# ─────────────────────────────────────────────────────────────────────────────

jobs:

# ═════════════════════════════════════════════════════════════════════════════
  encrypt-companion:
# ═════════════════════════════════════════════════════════════════════════════
    name: "Stage 1a — Encrypt companion.apk"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pycryptodome-${{ runner.os }}
          restore-keys: pip-pycryptodome-

      - name: Verify companion.apk exists and is valid APK
        run: |
          if [ ! -f app/src/main/assets/companion.apk ]; then
            echo "[X] companion.apk not found at app/src/main/assets/companion.apk"
            exit 1
          fi
          MAGIC=$(xxd -p -l 2 app/src/main/assets/companion.apk)
          if [ "$MAGIC" != "504b" ]; then
            echo "[X] companion.apk PK magic check failed (got: $MAGIC)"
            exit 1
          fi
          echo "[OK] companion.apk — $(stat -c '%s' app/src/main/assets/companion.apk) bytes ✓"

      - name: Install pycryptodome
        run: pip install pycryptodome --break-system-packages

      - name: Encrypt companion.apk → assets/companion.enc
        run: |
          python3 tools/encrypt_companion.py \
            app/src/main/assets/companion.apk \
            app/src/main/assets

      - name: Upload companion.enc
        uses: actions/upload-artifact@v4
        with:
          name: companion-enc
          path: app/src/main/assets/companion.enc
          retention-days: 3

      - name: Upload patched companion C++ source (expires in 1 day)
        uses: actions/upload-artifact@v4
        with:
          name: patched-companion-cpp
          path: app/src/main/cpp/companion_decrypt.cpp
          retention-days: 1


# ═════════════════════════════════════════════════════════════════════════════
  encrypt-nova-dex:
# ═════════════════════════════════════════════════════════════════════════════
    name: "Stage 1b — Build Nova DEX + Encrypt → nova.enc"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle wrapper jar
        uses: actions/cache@v4
        id: cache-gradle-wrapper
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-8.2-${{ runner.os }}

      - name: Download Gradle wrapper jar
        if: steps.cache-gradle-wrapper.outputs.cache-hit != 'true'
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pycryptodome-${{ runner.os }}
          restore-keys: pip-pycryptodome-

      - name: Install pycryptodome
        run: pip install pycryptodome --break-system-packages

      - name: Grant gradlew permission
        run: chmod +x gradlew

      # Build Nova release APK just to extract classes.dex
      - name: Build Nova APK to extract classes.dex
        run: |
          ./gradlew assembleRelease \
            --no-daemon

      - name: Extract classes.dex from built APK
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "Extracting DEX from: $APK"
          mkdir -p build/dex_extracted
          unzip -o "$APK" "classes.dex" -d build/dex_extracted
          unzip -o "$APK" "classes2.dex" -d build/dex_extracted 2>/dev/null || true
          echo "Extracted:"
          ls -lh build/dex_extracted/

      - name: Encrypt classes.dex → assets/nova.enc
        run: |
          python3 tools/encrypt_nova_dex.py \
            build/dex_extracted/classes.dex \
            app/src/main/assets \
            app/src/main/cpp/nova_dex_decrypt.cpp

          # Encrypt classes2.dex if present → nova2.enc
          if [ -f "build/dex_extracted/classes2.dex" ]; then
            python3 tools/encrypt_nova_dex.py \
              build/dex_extracted/classes2.dex \
              app/src/main/assets \
              app/src/main/cpp/nova_dex_decrypt.cpp
            mv app/src/main/assets/nova.enc app/src/main/assets/nova2.enc
            echo "[OK] classes2.dex → nova2.enc"
          fi

      - name: Show results
        run: |
          ls -lh app/src/main/assets/nova*.enc
          grep "NOVA_DEX_KEY_HEX" app/src/main/cpp/nova_dex_decrypt.cpp

      - name: Upload nova.enc
        uses: actions/upload-artifact@v4
        with:
          name: nova-enc
          path: app/src/main/assets/nova*.enc
          retention-days: 3

      - name: Upload patched nova C++ source (expires in 1 day)
        uses: actions/upload-artifact@v4
        with:
          name: patched-nova-cpp
          path: app/src/main/cpp/nova_dex_decrypt.cpp
          retention-days: 1


# ═════════════════════════════════════════════════════════════════════════════
  build-native:
# ═════════════════════════════════════════════════════════════════════════════
    name: "Stage 2 — NDK Build libcompanionguard.so + libnovaguard.so"
    runs-on: ubuntu-latest
    needs: [encrypt-companion, encrypt-nova-dex]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download patched companion C++ source
        uses: actions/download-artifact@v4
        with:
          name: patched-companion-cpp
          path: app/src/main/cpp/

      - name: Download patched nova C++ source
        uses: actions/download-artifact@v4
        with:
          name: patched-nova-cpp
          path: app/src/main/cpp/

      - name: Confirm both keys are in downloaded cpp files
        run: |
          grep "AES_KEY_HEX" app/src/main/cpp/companion_decrypt.cpp
          grep "NOVA_DEX_KEY_HEX" app/src/main/cpp/nova_dex_decrypt.cpp

      - name: Cache NDK
        uses: actions/cache@v4
        id: cache-ndk
        with:
          path: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-${{ runner.os }}

      - name: Set up NDK ${{ env.NDK_VERSION }}
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Cache OpenSSL prebuilts
        uses: actions/cache@v4
        id: cache-openssl
        with:
          path: app/third_party/openssl
          key: openssl-${{ env.OPENSSL_TAG }}-${{ env.ABIS }}-${{ runner.os }}

      - name: Query OpenSSL release assets
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -s \
            "https://api.github.com/repos/217heidai/openssl_for_android/releases/tags/${{ env.OPENSSL_TAG }}" \
            -o openssl_release.json

      - name: Download and extract OpenSSL for all ABIs
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/third_party/openssl
          for ABI in ${{ env.ABIS }}; do
            URL=$(grep -o '"browser_download_url": *"[^"]*'"${ABI}"'[^"]*"' \
              openssl_release.json | head -1 | sed 's/.*"\(https[^"]*\)"/\1/')
            if [ -z "$URL" ]; then echo "[X] No asset for $ABI"; exit 1; fi
            curl -L -o "openssl-${ABI}.tar.gz" "$URL"
            mkdir -p "app/third_party/openssl/${ABI}"
            tar -xzf "openssl-${ABI}.tar.gz" -C "app/third_party/openssl/${ABI}" --strip-components=1
            rm "openssl-${ABI}.tar.gz"
            echo "[OK] $ABI OpenSSL ready"
          done

      - name: Cache compiled native libs
        uses: actions/cache@v4
        id: cache-native-libs
        with:
          path: build/native-libs
          key: native-libs-${{ env.NDK_VERSION }}-${{ env.OPENSSL_TAG }}-${{ hashFiles('app/src/main/cpp/companion_decrypt.cpp', 'app/src/main/cpp/nova_dex_decrypt.cpp', 'app/src/main/cpp/CMakeLists.txt') }}

      - name: Build libcompanionguard.so + libnovaguard.so for all ABIs
        if: steps.cache-native-libs.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native-libs
          for ABI in ${{ env.ABIS }}; do
            echo "══ Building $ABI"
            OPENSSL="${GITHUB_WORKSPACE}/app/third_party/openssl/${ABI}"
            BUILD="build/native-${ABI}"
            mkdir -p "$BUILD"
            cmake app/src/main/cpp/ -B "$BUILD" \
              -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${ABI}" \
              -DANDROID_PLATFORM="${{ env.ANDROID_PLATFORM }}" \
              -DOPENSSL_ANDROID_ROOT="${OPENSSL}" \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build "$BUILD" --config Release

            mkdir -p "build/native-libs/${ABI}"

            SO_COMPANION=$(find "$BUILD" -name "libcompanionguard.so" | head -1)
            SO_NOVA=$(find "$BUILD" -name "libnovaguard.so" | head -1)

            if [ -z "$SO_COMPANION" ]; then echo "[X] libcompanionguard.so missing for $ABI"; exit 1; fi
            if [ -z "$SO_NOVA" ]; then echo "[X] libnovaguard.so missing for $ABI"; exit 1; fi

            cp "$SO_COMPANION" "build/native-libs/${ABI}/libcompanionguard.so"
            cp "$SO_NOVA"      "build/native-libs/${ABI}/libnovaguard.so"
            echo "[OK] $ABI — both .so files built"
          done

      - name: Upload all native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: build/native-libs/
          retention-days: 3


# ═════════════════════════════════════════════════════════════════════════════
  build-apk:
# ═════════════════════════════════════════════════════════════════════════════
    name: "Stage 3 — Build Final Nova APK"
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle wrapper jar
        uses: actions/cache@v4
        id: cache-gradle-wrapper
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-8.2-${{ runner.os }}

      - name: Download Gradle wrapper jar
        if: steps.cache-gradle-wrapper.outputs.cache-hit != 'true'
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pycryptodome-${{ runner.os }}
          restore-keys: pip-pycryptodome-

      - name: Install pycryptodome
        run: pip install pycryptodome --break-system-packages

      - name: Remove plain companion.apk from assets
        run: rm -f app/src/main/assets/companion.apk

      - name: Download companion.enc
        uses: actions/download-artifact@v4
        with:
          name: companion-enc
          path: app/src/main/assets/

      - name: Download nova.enc
        uses: actions/download-artifact@v4
        with:
          name: nova-enc
          path: app/src/main/assets/

      - name: Verify encrypted assets
        run: |
          echo "=== Assets folder ==="
          ls -lh app/src/main/assets/

          [ -f "app/src/main/assets/companion.enc" ] && echo "[OK] companion.enc ✓" || { echo "[X] companion.enc missing"; exit 1; }
          [ -f "app/src/main/assets/nova.enc" ] && echo "[OK] nova.enc ✓" || { echo "[X] nova.enc missing"; exit 1; }
          [ ! -f "app/src/main/assets/companion.apk" ] && echo "[OK] companion.apk absent ✓" || { echo "[X] companion.apk must not ship"; exit 1; }

      - name: Download native libs
        uses: actions/download-artifact@v4
        with:
          name: native-libs
          path: build/native-libs/

      - name: Place all .so files into jniLibs
        run: |
          for ABI in ${{ env.ABIS }}; do
            mkdir -p "app/src/main/jniLibs/${ABI}"
            for LIB in libcompanionguard libnovaguard; do
              SRC="build/native-libs/${ABI}/${LIB}.so"
              DEST="app/src/main/jniLibs/${ABI}/${LIB}.so"
              if [ ! -f "$SRC" ]; then echo "[X] Missing $LIB.so for $ABI"; exit 1; fi
              cp "$SRC" "$DEST"
              echo "[OK] $ABI/${LIB}.so ($(ls -lh "$DEST" | awk '{print $5}'))"
            done
          done

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build final APK (skip encrypt tasks — already done in Stage 1)
        run: |
          VARIANT="${{ github.event.inputs.build_variant || 'release' }}"
          TASK="assemble$(echo ${VARIANT} | sed 's/./\U&/')"
          ./gradlew "$TASK" \
            -x encryptCompanion \
            -x encryptNovaDex \
            --stacktrace --no-daemon

      - name: Locate built APK
        id: locate-apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found: $APK ($(du -h "$APK" | cut -f1))"

      - name: Verify final APK structure
        run: |
          APK="${{ steps.locate-apk.outputs.apk_path }}"

          for ENC in companion.enc nova.enc; do
            if unzip -l "$APK" | grep -q "$ENC"; then
              echo "[OK] assets/$ENC ✓"
            else
              echo "[X] $ENC missing from APK"; exit 1
            fi
          done

          if unzip -l "$APK" | grep -q "assets/companion.apk"; then
            echo "[X] SECURITY: companion.apk found unencrypted!"; exit 1
          fi
          echo "[OK] companion.apk absent ✓"

          for ABI in ${{ env.ABIS }}; do
            for LIB in libcompanionguard libnovaguard; do
              if unzip -l "$APK" | grep -q "lib/${ABI}/${LIB}.so"; then
                echo "[OK] lib/${ABI}/${LIB}.so ✓"
              else
                echo "[X] lib/${ABI}/${LIB}.so MISSING"; exit 1
              fi
            done
          done

          echo ""
          echo "=== Final APK size ==="
          du -h "$APK"

      - name: Upload final Nova APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-launcher-${{ github.event.inputs.build_variant || 'release' }}-${{ github.run_number }}
          path: ${{ steps.locate-apk.outputs.apk_path }}
          retention-days: 30
